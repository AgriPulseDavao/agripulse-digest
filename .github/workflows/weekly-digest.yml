name: Weekly AgriPulse Digest

on:
  schedule:
    - cron: '0 23 * * 4'   # 07:00 Friday in Davao (UTC+8)
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system libraries for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev libcairo2
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Generate and email the digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python digest.py
